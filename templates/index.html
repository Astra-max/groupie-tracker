<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/templates/css/index.css" type="text/css">
    <title>{{.Title}}</title>
</head>
<body>
    <div class="container">
        <h1>🎵 Groupie Trackers</h1>
        
        <div class="nav">
            <a href="/">Home</a>
            <a href="/search">Search Artists</a>
        </div>
        
        <div class="stats">
            <strong>Total Artists: {{len .Artists}}</strong> | Click on any artist to see their concert dates
        </div>
        
        <div class="artists-grid">
            {{range .Artists}}
            <a href="/artist/{{.ID}}" class="artist-card">
                <img src="{{.Image}}" alt="{{.Name}}" class="artist-image">
                <div class="artist-info">
                    <div class="artist-name">{{.Name}}</div>
                    <div class="artist-details">
                        <p><strong>Formed:</strong> {{.CreationDate}}</p>
                        <p><strong>First Album:</strong> {{.FirstAlbum}}</p>
                        <p><strong>Members:</strong> {{len .Members}}</p>
                    </div>
                    <span class="member-count">View Concerts →</span>
                </div>
            </a>
            {{end}}
        </div>
    </div>
</body>
</html>
