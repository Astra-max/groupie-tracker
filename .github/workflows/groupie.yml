name: Build and deploy groupier tracker

on:
  push:
    - main


jobs:
  build:
    name: Build and deploy groupie tracker
    runs-on:
      ubuntu-latest

  steps:
   name: checkout
   uses: action/checkout@2

   name: setup golang
   uses: action/setup-go@v5
   with:
     go-version: 1.22

  name: Install project dependency
  run:
    go mod download

  name: Run all test
  run: go test -v ./tests/...

  name: Run builds
  run: go build -v ./...